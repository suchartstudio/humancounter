<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Counter Client (Prachuap)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <style>
        :root {
            --bg-main: #0c0a09;
            --panel-bg: #1c1917;
            --gold: #eab308;
            --text-light: #f5f5f4;
            --text-muted: #a8a29e;
            --border-color: #292524;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%; background-color: var(--bg-main);
            color: var(--text-light); font-family: 'Chakra Petch', sans-serif;
            overflow: hidden; display: flex; flex-direction: column;
        }

        .top-header {
            width: 100%; background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            border-bottom: 3px solid var(--gold); padding: 15px; text-align: center;
        }
        .top-header h1 { font-size: 20px; color: #fef08a; font-weight: 700; }

        .main-workspace { flex: 1; display: flex; width: 100%; height: calc(100% - 65px); }

        /* ฝั่งซ้าย: กล้องวิดีโอ */
        .video-side { flex: 1.2; background-color: #000; position: relative; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .video-wrapper { position: relative; width: 100%; height: 100%; max-width: 900px; aspect-ratio: 16 / 9; background: #141414; border-radius: 12px; overflow: hidden; border: 1px solid #3f3f46; }
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #ai-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; }

        /* ฝั่งขวา: แผงควบคุมและแผนที่พิกัดกล้อง */
        .panel-side { flex: 0.8; background-color: var(--panel-bg); padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
        
        .counter-card { background: #141414; border: 1px solid #44403c; border-radius: 16px; padding: 15px; text-align: center; }
        .counter-value { font-size: 54px; font-weight: 700; color: var(--gold); line-height: 1; margin: 8px 0; }
        .timer-badge { font-size: 14px; color: #22c55e; background: rgba(34, 197, 94, 0.1); padding: 4px 12px; border-radius: 20px; display: inline-block; }

        .action-btn { width: 100%; padding: 12px; font-size: 15px; font-weight: 700; border: none; border-radius: 10px; color: white; cursor: pointer; transition: background 0.2s; }
        .btn-start { background: #0a84ff; }
        .btn-active { background: #ff453a; }

        /* ส่วนกล่องข้อมูลสถานที่และแผนที่ */
        .form-group { display: flex; flex-direction: column; gap: 6px; margin-top: 5px; }
        .form-group label { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .location-input { width: 100%; padding: 10px 14px; background: #141414; border: 1px solid var(--border-color); border-radius: 8px; color: white; font-family: 'Chakra Petch', sans-serif; font-size: 14px; }
        .location-input:focus { border-color: var(--gold); outline: none; }

        #map-container { width: 100%; height: 180px; background: #000; border-radius: 12px; border: 1px solid var(--border-color); overflow: hidden; margin-top: 5px; }
        .btn-save-loc { background: var(--gold); color: #000; }
        .btn-save-loc:hover { background: #facc15; }
    </style>
</head>
<body>

    <div class="top-header">
        <h1>ระบบบันทึกพิกัดและนับจำนวนคน - เทศบาลเมืองประจวบคีรีขันธ์</h1>
    </div>

    <div class="main-workspace">
        <div class="video-side">
            <div class="video-wrapper">
                <video id="webcam" autoplay playsinline muted></video>
                <canvas id="ai-overlay"></canvas>
            </div>
        </div>

        <div class="panel-side">
            <div class="counter-card">
                <div class="counter-label">👤 จำนวนนักท่องเที่ยวสะสมเครื่องนี้</div>
                <div class="counter-value" id="local-count-text">0</div>
                <div class="timer-badge" id="timer-display">เวลาเริ่มเดิน: --:--:--</div>
            </div>

            <button id="master-btn" class="action-btn btn-start" disabled onclick="toggleTrackingSession()">กำลังโหลดโมเดล AI...</button>

            <hr style="border:0; border-top:1px solid var(--border-color);">
            
            <div class="form-group">
                <label>📍 1. ตั้งชื่อเรียกพิกัดพิกัด / สถานที่ติดตั้งกล้องนี้</label>
                <input type="text" id="location-name-input" class="location-input" placeholder="เช่น ประตูทางเข้าหลัก, ศาลาชมวิวชายหาด">
            </div>

            <div class="form-group" style="margin-top: 5px;">
                <label>🗺️ 2. ระบุตำแหน่งพิกัดแผนที่ (ลากหมุดไปวางตำแหน่งจริง)</label>
                <div id="map-container"></div>
            </div>

            <button class="action-btn btn-save-loc" onclick="saveLocationCoordinates()">💾 บันทึกตำแหน่งและชื่อสถานที่กล้องนี้</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:9d20ca75d4bb73626ebef8",
            measurementId: "G-81D391W1GR"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // รหัสล็อกประจำเครื่องคอมพิวเตอร์
        const myNodeId = "node_pc_" + navigator.userAgent.replace(/[^a-zA-Z0-9]/g, "").slice(0, 8);

        let model = null, isTracking = false, startTime = null, timeInterval = null;
        let localPeopleCount = 0, trackedPeople = [];
        let currentLat = 11.8039, currentLng = 99.7961; 
        let map, nodeMarker;

        function initMap() {
            map = L.map('map-container').setView([currentLat, currentLng], 14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            nodeMarker = L.marker([currentLat, currentLng], { draggable: true }).addTo(map);
            nodeMarker.on('dragend', function (e) {
                const position = nodeMarker.getLatLng();
                currentLat = position.lat;
                currentLng = position.lng;
            });
        }

        async function initCameraAndAI() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 }, audio: false });
                document.getElementById('webcam').srcObject = stream;
                model = await cocoSsd.load();
                const btn = document.getElementById('master-btn');
                btn.innerText = "▶️ เริ่มนับจำนวนคน";
                btn.disabled = false;
                runPredictionEngine();
            } catch (err) { alert("ไม่พบกล้องเว็บแคม"); }
        }

        window.toggleTrackingSession = function() {
            const btn = document.getElementById('master-btn');
            if(!isTracking) {
                isTracking = true;
                startTime = Date.now();
                btn.innerText = "⏹️ หยุดการสแกนนับคน";
                btn.className = "action-btn btn-active";
                
                timeInterval = setInterval(() => {
                    let diff = Date.now() - startTime;
                    let hh = String(Math.floor(diff / 3600000)).padStart(2, '0');
                    let mm = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
                    let ss = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
                    document.getElementById('timer-display').innerText = `เวลาเริ่มเดิน: ${hh}:${mm}:${ss}`;
                }, 1000);
            } else {
                isTracking = false;
                clearInterval(timeInterval);
                btn.innerText = "▶️ เริ่มนับจำนวนคน";
                btn.className = "action-btn btn-start";
            }
        };

        // ฟังก์ชันส่งบันทึกชื่อพิกัดสถานที่ + ละติจูด ลองจิจูด
        window.saveLocationCoordinates = function() {
            const locationName = document.getElementById('location-name-input').value.trim();
            if(!locationName) {
                alert("กรุณากรอกระบุชื่อเรียกพิกัดสถานที่ตั้งกล้องก่อนบันทึก!");
                return;
            }

            set(ref(database, `nodes/${myNodeId}`), {
                node_id: myNodeId,
                location_name: locationName, // บันทึกชื่อลงฐานข้อมูล
                latitude: currentLat,
                longitude: currentLng,
                people_count: localPeopleCount,
                timestamp: Date.now()
            }).then(() => alert("💾 บันทึกพิกัดและชื่อสถานที่ '" + locationName + "' เรียบร้อยแล้ว!"))
              .catch(err => alert("Error: " + err.message));
        };

        async function runPredictionEngine() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('ai-overlay');
            const ctx = canvas.getContext('2d');

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth; canvas.height = video.videoHeight;
                const predictions = await model.detect(video);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                let currentFrameDetections = [];
                predictions.forEach(p => {
                    if (p.class === 'person' && p.score > 0.50) {
                        const [x, y, w, h] = p.bbox;
                        currentFrameDetections.push({ cx: x + w / 2, cy: y + h / 2 });
                        ctx.strokeStyle = "#eab308"; ctx.lineWidth = 4; ctx.strokeRect(x, y, w, h);
                    }
                });

                if(isTracking) {
                    let now = Date.now();
                    currentFrameDetections.forEach(det => {
                        let matchedTrack = null;
                        trackedPeople.forEach(track => {
                            let dist = Math.hypot(det.cx - track.cx, det.cy - track.cy);
                            if (dist < 85) matchedTrack = track;
                        });

                        if (matchedTrack) {
                            matchedTrack.cx = det.cx; matchedTrack.cy = det.cy; matchedTrack.lastSeen = now;
                        } else {
                            localPeopleCount++;
                            document.getElementById('local-count-text').innerText = localPeopleCount;
                            trackedPeople.push({ cx: det.cx, cy: det.cy, lastSeen: now });
                            
                            // อัปเดตขึ้น Firebase
                            set(ref(database, `nodes/${myNodeId}/people_count`), localPeopleCount);
                        }
                    });
                    trackedPeople = trackedPeople.filter(t => (now - t.lastSeen) < 1500);
                }
            }
            requestAnimationFrame(runPredictionEngine);
        }

        initMap();
        initCameraAndAI();
    </script>
</body>
</html>
