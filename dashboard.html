<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tourist Master Dashboard - ระบบสรุปผลส่วนกลาง</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-main: #0c0a09;
            --panel-bg: #1c1917;
            --gold: #eab308;
            --gold-light: #fef08a;
            --text-light: #f5f5f4;
            --text-muted: #a8a29e;
            --border-color: #292524;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: var(--bg-main); color: var(--text-light); font-family: 'Chakra Petch', sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        /* 🔒 โครงสร้างกล่องล็อกอินพร้อมโลโก้ */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main); z-index: 9999;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .login-box {
            background-color: var(--panel-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 30px; width: 100%; max-width: 400px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .login-logo {
            height: 60px; width: auto; object-fit: contain; margin-bottom: 15px;
        }
        .login-box h3 { color: var(--gold-light); margin-bottom: 8px; font-size: 20px; }
        .login-box p { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
        .password-input {
            width: 100%; padding: 12px; background: #141414; border: 1px solid var(--border-color);
            border-radius: 8px; color: white; font-size: 18px; text-align: center;
            letter-spacing: 4px; margin-bottom: 15px; font-family: sans-serif;
        }
        .password-input:focus { border-color: var(--gold); outline: none; }
        .btn-login {
            width: 100%; padding: 12px; background-color: var(--gold); color: #000;
            border: none; border-radius: 8px; font-weight: 700; font-size: 16px;
            cursor: pointer; font-family: 'Chakra Petch', sans-serif; transition: background 0.2s;
        }
        .btn-login:hover { background-color: #facc15; }
        .error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }

        .main-dashboard-content {
            display: none; flex: 1; flex-direction: column; width: 100%; height: 100%;
        }

        /* 🖼️ แบนเนอร์ด้านบนของ Dashboard ที่จัดกลุ่มชื่อคู่โลโก้ */
        .top-total-banner {
            width: 100%; background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            border-bottom: 2px solid var(--gold); padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .banner-identity { display: flex; align-items: center; gap: 15px; }
        .banner-logo { height: 45px; width: auto; object-fit: contain; }
        .banner-label { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); text-align: left; }
        .banner-value { font-size: 44px; font-weight: 700; color: var(--gold); text-shadow: 0 0 20px rgba(234,179,8,0.4); line-height: 1; }

        .workspace-grid { flex: 1; display: flex; width: 100%; height: calc(100% - 77px); }

        .map-wrapper { flex: 1.2; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; }

        .sidebar-list-panel { flex: 0.8; background-color: var(--panel-bg); border-left: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .panel-heading { font-size: 15px; color: var(--gold-light); font-weight: 600; margin-bottom: 15px; text-transform: uppercase; border-left: 4px solid var(--gold); padding-left: 8px; }

        .node-row-item {
            background: #141414; border: 1px solid var(--border-color); border-radius: 12px;
            padding: 14px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 10px;
            border-left: 4px solid var(--gold);
        }
        .node-meta-box { display: flex; justify-content: space-between; align-items: flex-start; }
        .node-name { font-weight: 600; font-size: 15px; color: var(--text-light); }
        .node-id-sub { font-size: 11px; color: var(--text-muted); display: block; margin-top: 2px; font-family: monospace; }
        .node-count-badge { background: rgba(234, 179, 8, 0.15); border: 1px solid var(--gold); color: var(--gold); padding: 4px 12px; border-radius: 8px; font-weight: 700; font-family: monospace; font-size: 15px; }
        
        .node-action-bar { display: flex; gap: 8px; justify-content: flex-end; border-top: 1px solid #262220; padding-top: 8px; }
        .action-mini-btn {
            padding: 5px 10px; font-size: 12px; font-family: 'Chakra Petch', sans-serif; font-weight: 600;
            border: none; border-radius: 6px; cursor: pointer; color: white; transition: opacity 0.2s;
        }
        .action-mini-btn:hover { opacity: 0.8; }
        .btn-edit-node { background-color: var(--info); }
        .btn-delete-node { background-color: var(--danger); }

        .custom-map-label {
            background: rgba(234, 179, 8, 0.95) !important; border: 1px solid #fff !important; 
            color: #000 !important; font-weight: bold !important; font-size: 12px !important;
            border-radius: 5px !important; padding: 3px 6px !important; white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); font-family: 'Chakra Petch', sans-serif;
        }

        @media (max-width: 768px) {
            body, html { overflow: auto; }
            .top-total-banner { flex-direction: column; gap: 10px; height: auto; text-align: center; }
            .banner-label { text-align: center; }
            .workspace-grid { flex-direction: column; height: auto; }
            .map-wrapper { width: 100%; height: 50vh; }
            .sidebar-list-panel { width: 100%; border-left: none; border-top: 1px solid var(--border-color); }
            .banner-value { font-size: 36px; }
        }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <img src="Logo.png" alt="Logo" class="login-logo">
            <h3>🏛️ ศูนย์ควบคุมส่วนกลาง</h3>
            <p>ระบบรักษาความปลอดภัย Dashboard แผนที่นับคน</p>
            <input type="password" id="pass-field" class="password-input" placeholder="•••••••••" onkeydown="if(event.key === 'Enter') checkSystemPassword()">
            <button class="btn-login" onclick="checkSystemPassword()">🚀 ยืนยันรหัสผ่าน</button>
            <div id="error-text" class="error-msg">❌ รหัสผ่านไม่ถูกต้อง กรุณาลองใหม่อีกครั้ง!</div>
        </div>
    </div>

    <div id="dashboard-main-content" class="main-dashboard-content">
        <div class="top-total-banner">
            <div class="banner-identity">
                <img src="Logo.png" alt="Logo" class="banner-logo">
                <div>
                    <div class="banner-label">📊 ระบบสรุปผลสารสนเทศภูมิศาสตร์</div>
                    <span style="font-size: 11px; color: var(--gold-light);">เทศบาลเมืองประจวบคีรีขันธ์</span>
                </div>
            </div>
            <div>
                <span style="font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 2px;">👤 ยอดสะสมรวมทุกจุดตรวจ</span>
                <div class="banner-value" id="global-total-text">0</div>
            </div>
        </div>

        <div class="workspace-grid">
            <div class="map-wrapper">
                <div id="map"></div>
            </div>

            <div class="sidebar-list-panel">
                <div class="panel-heading">📊 สถิติจำแนกและจัดการจุดติดตั้งกล้อง</div>
                <div id="node-rows-container">
                    </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:9d20ca75d4bb73626ebef8",
            measurementId: "G-81D391W1GR"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let map = null;
        let activeMarkersMap = {}; 

        window.checkSystemPassword = function() {
            const inputPass = document.getElementById('pass-field').value;
            if (inputPass === "987654321") {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('dashboard-main-content').style.display = 'flex';
                startDashboardEngine();
            } else {
                document.getElementById('error-text').style.display = 'block';
                document.getElementById('pass-field').value = "";
                document.getElementById('pass-field').focus();
            }
        };

        function startDashboardEngine() {
            map = L.map('map').setView([11.8039, 99.7961], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            const nodesRef = ref(database, 'nodes');
            onValue(nodesRef, (snapshot) => {
                const rowsContainer = document.getElementById('node-rows-container');
                rowsContainer.innerHTML = ""; 

                let globalGrandTotal = 0;
                let incomingNodeKeys = [];

                snapshot.forEach((childSnapshot) => {
                    const nodeKey = childSnapshot.key;
                    const nodeData = childSnapshot.val();

                    if (nodeData && nodeData.latitude) {
                        incomingNodeKeys.push(nodeKey);
                        const currentCount = nodeData.people_count || 0;
                        const displayName = nodeData.location_name ? nodeData.location_name : `จุดสแกนสำรอง (${nodeKey})`;
                        
                        globalGrandTotal += currentCount;

                        const rowHtml = document.createElement('div');
                        rowHtml.className = "node-row-item";
                        rowHtml.innerHTML = `
                            <div class="node-meta-box">
                                <div>
                                    <div class="node-name">📍 ${displayName}</div>
                                    <span class="node-id-sub">ID: ${nodeKey.toUpperCase()}</span>
                                </div>
                                <div class="node-count-badge">${currentCount.toLocaleString()} คน</div>
                            </div>
                            <div class="node-action-bar">
                                <button class="action-mini-btn btn-edit-node" onclick="editNodeLocationName('${nodeKey}', '${displayName.replace(/'/g, "\\'")}')">📝 แก้ไขชื่อ</button>
                                <button class="action-mini-btn btn-delete-node" onclick="deleteNodeFromSystem('${nodeKey}', '${displayName.replace(/'/g, "\\'")}')">🗑️ ลบพิกัด</button>
                            </div>
                        `;
                        rowsContainer.appendChild(rowHtml);

                        if (activeMarkersMap[nodeKey]) {
                            activeMarkersMap[nodeKey].setLatLng([nodeData.latitude, nodeData.longitude]);
                            activeMarkersMap[nodeKey].setTooltipContent(`📍 ${displayName}: ${currentCount} คน`);
                        } else {
                            let newMarker = L.marker([nodeData.latitude, nodeData.longitude]).addTo(map);
                            newMarker.bindTooltip(`📍 ${displayName}: ${currentCount} คน`, {
                                permanent: true, direction: 'top', className: 'custom-map-label'
                            });
                            activeMarkersMap[nodeKey] = newMarker;
                        }
                    }
                });

                Object.keys(activeMarkersMap).forEach(key => {
                    if(!incomingNodeKeys.includes(key)) {
                        map.removeLayer(activeMarkersMap[key]);
                        delete activeMarkersMap[key];
                    }
                });

                document.getElementById('global-total-text').innerText = globalGrandTotal.toLocaleString();
            });
        }

        window.editNodeLocationName = function(nodeId, currentName) {
            const newName = prompt(`✍️ แก้ไขชื่อสถานที่สำหรับจุดติดตั้งนี้:`, currentName);
            if (newName !== null && newName.trim() !== "") {
                update(ref(database, `nodes/${nodeId}`), { location_name: newName.trim() })
                .catch(err => alert("Error: " + err.message));
            }
        };

        window.deleteNodeFromSystem = function(nodeId, displayName) {
            if (confirm(`⚠️ ต้องการลบจุดติดตั้ง "${displayName}" ใช่หรือไม่?`)) {
                if(activeMarkersMap[nodeId]) {
                    map.removeLayer(activeMarkersMap[nodeId]);
                    delete activeMarkersMap[nodeId];
                }
                remove(ref(database, `nodes/${nodeId}`)).catch(err => alert("Error: " + err.message));
            }
        };
    </script>
</body>
</html>
