<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tourist Master Dashboard - ป้ายรวมยอดแยกสาขา</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-main: #0c0a09;
            --panel-bg: #1c1917;
            --gold: #eab308;
            --gold-light: #fef08a;
            --text-light: #f5f5f4;
            --text-muted: #a8a29e;
            --border-color: #292524;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: var(--bg-main); color: var(--text-light); font-family: 'Chakra Petch', sans-serif; overflow: hidden; display: flex; flex-direction: column; }

        /* ป้ายยอดสะสมรวมด้านบนสุด */
        .top-total-banner {
            width: 100%; background: linear-gradient(135deg, #1e1b4b 0%, #0f172a 100%);
            border-bottom: 2px solid var(--gold); padding: 20px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .banner-label { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }
        .banner-value { font-size: 54px; font-weight: 700; color: var(--gold); text-shadow: 0 0 20px rgba(234,179,8,0.4); line-height: 1.1; }

        /* พื้นที่แบ่ง Layout */
        .workspace-grid { flex: 1; display: flex; width: 100%; height: calc(100% - 110px); }

        /* ส่วนแผนที่ฝั่งซ้าย */
        .map-wrapper { flex: 1.2; height: 100%; position: relative; }
        #map { width: 100%; height: 100%; }

        /* ส่วนตารางแถวข้อมูลฝั่งขวา */
        .sidebar-list-panel { flex: 0.8; background-color: var(--panel-bg); border-left: 1px solid var(--border-color); padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .panel-heading { font-size: 15px; color: var(--gold-light); font-weight: 600; margin-bottom: 15px; text-transform: uppercase; border-left: 4px solid var(--gold); padding-left: 8px; }

        .node-row-item {
            background: #141414; border: 1px solid var(--border-color); border-radius: 10px;
            padding: 12px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .node-name { font-weight: 600; font-size: 14px; color: var(--text-light); }
        .node-count-badge { background: rgba(234, 179, 8, 0.15); border: 1px solid var(--gold); color: var(--gold); padding: 4px 12px; border-radius: 8px; font-weight: 700; font-family: monospace; }

        .custom-map-label {
            background: rgba(234, 179, 8, 0.95) !important; border: 1px solid #fff !important; 
            color: #000 !important; font-weight: bold !important; font-size: 11px !important;
            border-radius: 5px !important; padding: 2px 5px !important; white-space: nowrap;
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 768px) {
            body, html { overflow: auto; }
            .workspace-grid { flex-direction: column; height: auto; }
            .map-wrapper { width: 100%; height: 50vh; }
            .sidebar-list-panel { width: 100%; border-left: none; border-top: 1px solid var(--border-color); }
            .banner-value { font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="top-total-banner">
        <div class="banner-label">👤 ยอดนักท่องเที่ยวรวมทุกจุดสแกนสะสมทั่วพื้นที่</div>
        <div class="banner-value" id="global-total-text">0</div>
    </div>

    <div class="workspace-grid">
        <div class="map-wrapper">
            <div id="map"></div>
        </div>

        <div class="sidebar-list-panel">
            <div class="panel-heading">📊 สถิติระบุจำแนกแยกตามจุดกล้อง</div>
            <div id="node-rows-container">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:9d20ca75d4bb73626ebef8",
            measurementId: "G-81D391W1GR"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // จุดศูนย์กลางแผนที่อยู่ที่ ประจวบคีรีขันธ์
        let map = L.map('map').setView([11.8039, 99.7961], 13);
        let mapMarkersLayers = [];

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // ดักจับและประมวลผลข้อมูลโครงสร้างคอมพิวเตอร์แต่ละจุด (Node)
        const nodesRef = ref(database, 'nodes');
        onValue(nodesRef, (snapshot) => {
            // ล้างจุดมาร์กเกอร์เดิมบนแผนที่
            mapMarkersLayers.forEach(layer => map.removeLayer(layer));
            mapMarkersLayers = [];

            // ล้างแถวข้อมูลด้านข้างตัวเดิมออก
            const rowsContainer = document.getElementById('node-rows-container');
            rowsContainer.innerHTML = "";

            let globalGrandTotal = 0;

            snapshot.forEach((childSnapshot) => {
                const nodeKey = childSnapshot.key;
                const nodeData = childSnapshot.val();

                if (nodeData && nodeData.latitude) {
                    const currentCount = nodeData.people_count || 0;
                    globalGrandTotal += currentCount;

                    // 1. สร้างแถวข้อมูลสรุปฝั่งขวา (Row Item UX)
                    const rowHtml = document.createElement('div');
                    rowHtml.className = "node-row-item";
                    rowHtml.innerHTML = `
                        <div class="node-name">🖥️ ${nodeKey.toUpperCase()}</div>
                        <div class="node-count-badge">${currentCount.toLocaleString()} คน</div>
                    `;
                    rowsContainer.appendChild(rowHtml);

                    // 2. ปักหมุดลงบนแผนที่จุดที่คอมเครื่องนั้นตั้งอยู่
                    let marker = L.marker([nodeData.latitude, nodeData.longitude]).addTo(map);
                    marker.bindTooltip(`👤 ${nodeKey}: ${currentCount} คน`, {
                        permanent: true, direction: 'top', className: 'custom-map-label'
                    });
                    mapMarkersLayers.push(marker);
                }
            });

            // 3. ปรับค่าตัวเลขป้ายสะสมใหญ่ด้านบนสุดรวมจากทุก Node
            document.getElementById('global-total-text').innerText = globalGrandTotal.toLocaleString();
        });
    </script>
</body>
</html>
